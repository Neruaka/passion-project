# Alembic configuration for PASSION backend.
# Migrations live in backend/migrations/. The DB URL is read from the
# DATABASE_URL environment variable (see migrations/env.py), NOT hardcoded here.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# Timestamped, descriptive revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# DB URL is injected at runtime from env (see env.py). Left blank on purpose.
sqlalchemy.url =

[post_write_hooks]
# Auto-format generated migrations with ruff.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
