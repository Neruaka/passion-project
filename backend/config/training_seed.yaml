# PASSION — Training program seed (US-013b, Sprint 2)
#
# Source of truth: docs/personal/training-program.md (PHUL V2 Bodyland, May 2026).
# Loaded into `exercise_targets` + `training_context` + `program_split` by
# `python -m src.scripts.seed_training`.
#
# Notes:
#   * `hevy_template_id` is resolved at load time by matching `title` against
#     the synced exercise_templates table (case-insensitive fuzzy).
#     Leave it null for exercises not yet logged in Hevy.
#   * Baselines = current starting load (May 2026 PHUL restart at Bodyland).
#   * Targets = 3-month goals (Aug 2026). 12-month goals under `long_term`.
#   * Permanently retired exercises (deadlift conventional, RDL, barbell squat)
#     are NOT here. The agent must never suggest them — see [[training-split]].

training_context:
  phase: cutting
  phase_started_at: 2026-05-01
  current_weight_kg: 108
  current_body_fat_pct: 34
  target_weight_kg: 100
  daily_kcal_target: 1800
  daily_protein_g_target_min: 180
  daily_protein_g_target_max: 200
  daily_hydration_l_target: 4
  sleep_target_hours_min: 7
  sleep_target_hours_max: 9
  bedtime_target: "23:00"
  wakeup_target: "07:00"
  daily_steps_target: 8000
  weekly_long_walks_target: 2
  weekly_session_target: 4
  active_split: "PHUL"
  notes: "PHUL V2 Bodyland — restart May 2026, cut to 100kg by Aug 2026."
  # Exercises permanently retired (lower-back history). The analysis engine
  # suppresses plateau/regression findings on these so old historical sessions
  # don't bubble up as actionable. Match is case-insensitive substring on
  # exercise_title.
  retired_exercises:
    - "Deadlift"            # conventional, sumo, etc.
    - "Romanian Deadlift"
    - "RDL"
    - "Squat (Barbell)"
    - "Squat (Barre)"
    - "Back Squat"
    - "Front Squat"
  supplements:
    - {name: Creatine, dose: 5g, timing: morning, frequency: daily}
    - {name: Whey, dose: 30g, timing: morning, frequency: daily}
    - {name: Casein, dose: 30g, timing: bedtime, frequency: daily}
    - {name: Collagen+VitC, dose: 15g, timing: morning, frequency: daily}
    - {name: Omega-3, dose: 6 caps EPA+DHA, timing: with_meals, frequency: daily}
    - {name: Magnesium bisglycinate, dose: 200mg, timing: evening, frequency: daily}
    - {name: Vitamin D3, dose: 2000 IU summer / 4000 IU winter, timing: noon, frequency: daily}
    - {name: Multivitamin, dose: 3 tablets/day, timing: with_meals, frequency: daily}

program_split:
  split_name: "PHUL"
  monday: upper_power
  tuesday: lower_power
  wednesday: upper_hypertrophy
  thursday: rest
  friday: lower_hypertrophy
  saturday: mobility
  sunday: rest

# ============================================================
