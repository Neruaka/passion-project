name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: passion
          POSTGRES_PASSWORD: passion
          POSTGRES_DB: passion
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U passion"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      # One canonical URL; migrations/env.py swaps +asyncpg -> +psycopg2 for Alembic.
      DATABASE_URL: postgresql+asyncpg://passion:passion@localhost:5432/passion
      # testcontainers in CI: Ryuk (the reaper container) often flakes on GH runners.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check . && ruff format --check .
      - name: Type-check
        working-directory: backend
        run: mypy src
      - name: Migrate (smoke test on the service postgres)
        working-directory: backend
        run: alembic upgrade head
      - name: Tests (unit + integration via testcontainers)
        working-directory: backend
        run: pytest
      - name: Coverage gate — services/fitness pure modules (>= 90%, NFR-TEST-002)
        working-directory: backend
        run: pytest tests/unit/services/fitness --cov --cov-config=.coveragerc-fitness --cov-fail-under=90 -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck --if-present
