name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: passion
          POSTGRES_PASSWORD: passion
          POSTGRES_DB: passion
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U passion"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check . && ruff format --check .
      - name: Type-check
        working-directory: backend
        run: mypy src
      - name: Migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://passion:passion@localhost:5432/passion
        run: alembic upgrade head
      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://passion:passion@localhost:5432/passion
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type-check
        working-directory: frontend
        run: npm run typecheck
